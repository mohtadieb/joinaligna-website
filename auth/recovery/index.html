<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Password Reset - Aligna</title>

<style>
body{
font-family:Arial;
background:#F8F5FF;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
border-radius:24px;
padding:40px;
max-width:500px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.button{
display:inline-block;
background:linear-gradient(135deg,#7B5CF0,#E96BD2,#FFA96C);
color:white;
font-weight:700;
padding:16px 24px;
border-radius:14px;
text-decoration:none;
margin-top:20px;
}
</style>

</head>

<body>

<div class="card">

<h1>Reset your password</h1>

<p>If you opened this on your phone we will open the Aligna app.</p>

<a class="button" href="aligna://reset-password">
Open Aligna App
</a>

</div>

<script>

const isMobile =
/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)

if(isMobile){
window.location.href="aligna://reset-password"
}

</script>

</body>
</html>
